version: "3.8"
services:
  ecosync:
    build: .
    ports:
      - "8000:8000"
    environment:
      - GEMINI_API_KEY=${GEMINI_API_KEY:-}
      - ECOSYNC_DB=/data/ecosync.db
    volumes:
      - ./data:/data
      - ./models:/app/models   # optional if using local models
    restart: unless-stopped
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>EcoSync Sentinel - Maintenance &amp; Inventory</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body data-page="maintenance">
  <!-- Emergency Banner -->
  <div id="emergency-banner" class="emergency-banner hidden">
    <div class="emergency-banner-content">
      <span id="emergency-banner-text">CRITICAL ALERT</span>
      <button id="emergency-banner-ack" class="btn btn-ack">Acknowledge</button>
    </div>
  </div>

  <div class="app-shell">
    <!-- Sidebar Navigation -->
    <aside class="sidebar">
      <div class="sidebar-header">
        <div class="logo-accent"></div>
        <span class="sidebar-title">EcoSync<br />Sentinel</span>
      </div>
      <nav class="sidebar-nav">
        <a href="/" class="nav-link">Dashboard</a>
        <a href="/diagnostics" class="nav-link">Asset Diagnostics</a>
        <a href="/maintenance" class="nav-link active">Maintenance &amp; Inventory</a>
      </nav>
      <!-- <nav class="sidebar-nav">
        <a href="index.html" class="nav-link">Dashboard</a>
        <a href="diagnostics.html" class="nav-link">Asset Diagnostics</a>
        <a href="maintenance.html" class="nav-link active">Maintenance &amp; Inventory</a>
      </nav> -->
    </aside>

    <div class="main-area">
      <!-- Top Bar -->
      <header class="top-bar">
        <div class="top-bar-left">
          <h1 class="top-title">EcoSync Sentinel</h1>
        </div>
        <div class="top-bar-right">
          <div class="connection-indicator">
            <span id="connection-dot" class="dot dot-disconnected"></span>
            <span class="connection-label">SSE Link</span>
          </div>
          <div class="system-time">
            <span class="system-time-label">System Time</span>
            <span id="system-time-value">--:--:--</span>
          </div>
        </div>
      </header>

      <main class="content maintenance-content">
        <div class="maintenance-grid">
          <!-- Left: Maintenance Calendar + Task List -->
          <section class="maint-column maint-left">
            <h2 class="section-title">Maintenance Calendar</h2>
            <div class="calendar-header">
              <span id="calendar-month-label">Month</span>
            </div>
            <div id="calendar-grid" class="calendar-grid">
              <!-- Calendar cells via JS -->
            </div>

            <div class="task-list-header">
              <h2 class="section-title">Scheduled Tasks</h2>
              <label class="sort-label">
                Sort by
                <select id="task-sort">
                  <option value="time">Time Remaining</option>
                  <option value="machine">Machine</option>
                </select>
              </label>
            </div>
            <div id="maintenance-task-list" class="task-list">
              <!-- Tasks via JS -->
            </div>
          </section>

          <!-- Right: Inventory Table -->
          <section class="maint-column maint-right">
            <div class="inventory-header">
              <h2 class="section-title">Inventory</h2>
              <button id="generate-bom-btn" class="btn btn-primary">Generate Bill of Materials</button>
            </div>
            <div class="table-wrapper">
              <table id="inventory-table" class="inventory-table">
                <thead>
                  <tr>
                    <th>Select</th>
                    <th>Part Name</th>
                    <th>Part Number</th>
                    <th>Current Stock</th>
                    <th>Minimum Required</th>
                    <th>Status</th>
                  </tr>
                </thead>
                <tbody>
                  <!-- Rows via JS -->
                </tbody>
              </table>
            </div>
          </section>
        </div>
      </main>
    </div>
  </div>

  <!-- Maintenance Day Modal -->
  <div id="day-modal" class="modal hidden">
    <div class="modal-content">
      <button id="day-modal-close" class="modal-close">&times;</button>
      <h2>Maintenance Tasks</h2>
      <div id="day-modal-body"></div>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
